<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сокращатель ссылок</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        input[type="url"] { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; }
        button { padding: 10px 30px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 5px; }
        .error { margin-top: 20px; padding: 15px; background: #ffebee; color: #c62828; border-radius: 5px; }
        .nav { margin-bottom: 30px; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .nav a { margin-right: 20px; color: #007bff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Главная</a>
    </div>

    <h1>🔗 Сокращатель ссылок</h1>
    
    <form action="/shorten" method="POST">
        <div class="form-group">
            <input type="url" name="url" placeholder="Вставьте длинную ссылку" required>
        </div>
        <button type="submit">Сократить</button>
    </form>

    {{if .Error}}
    <div class="error">
        {{.Error}}
    </div>
    {{end}}

    {{if .ShortUrl}}
    <div class="result">
        <h3>Короткая ссылка:</h3>
        <p><a href="/{{.ShortUrl}}" target="_blank">{{.ShortUrl}}</a></p>
        <button onclick="navigator.clipboard.writeText('{{.ShortUrl}}')">
            Копировать
        </button>
    </div>
    {{end}}
</body>
</html>
